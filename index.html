<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio MediaPipe - Nodos de la Mano</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h2 { margin-bottom: 10px; color: #00ffcc; }
        /* El contenedor mantiene el canvas al centro */
        .contenedor-camara {
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4/3;
        }
        /* El lienzo donde se dibujan los nodos */
        #canvas-salida {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }
    </style>

    <!-- 1. IMPORTAR LAS LIBRERÍAS DE MEDIAPIPE DESDE INTERNET (CDN) -->
    <!-- Librería base de MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <!-- Librería específica para dibujar los puntos y líneas -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <!-- El modelo de Inteligencia Artificial para las manos -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <h2>Interfaz de Reconocimiento de Nodos</h2>
    <div class="contenedor-camara">
        <!-- Video oculto: solo sirve para alimentar de imágenes a la IA -->
        <video id="video-entrada" style="display: none;" playsinline></video>
        <!-- Canvas visible: aquí es donde pintamos la magia -->
        <canvas id="canvas-salida" width="640" height="480"></canvas>
    </div>

    <!-- Conectamos nuestro cerebro de código -->
    <script src="app.js"></script>
</body>
</html>
